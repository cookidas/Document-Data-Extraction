<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>대시보드 — 화성시 농업직불금 자동화 시스템</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ── 대시보드 전용 레이아웃 ── */
    .dash-body {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 20px;
    }

    /* 업로드 섹션 */
    .upload-section {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 20px 24px;
      margin-bottom: 20px;
      box-shadow: var(--shadow-sm);
    }
    .upload-section-title {
      font-weight: 700;
      font-size: 15px;
      color: var(--gray-800);
      margin-bottom: 14px;
    }
    .upload-zone {
      border: 2px dashed var(--gray-300);
      border-radius: var(--radius);
      padding: 20px 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      background: var(--gray-50);
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: var(--primary);
      background: var(--primary-light);
    }
    .upload-zone.has-file {
      border-color: var(--success);
      background: var(--success-light);
    }
    .upload-zone-label {
      font-weight: 600;
      font-size: 13px;
      color: var(--gray-700);
      margin-bottom: 6px;
    }
    .upload-zone-hint {
      font-size: 12px;
      color: var(--gray-400);
    }

    /* 목록 섹션 */
    .list-section {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }
    .list-toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--gray-200);
      background: var(--gray-50);
    }
    .search-input {
      flex: 1;
      max-width: 280px;
      padding: 7px 12px;
      border: 1px solid var(--gray-300);
      border-radius: 6px;
      font-size: 13px;
      font-family: var(--font);
      outline: none;
    }
    .search-input:focus { border-color: var(--primary); }

    /* 탭 */
    .tabs {
      display: flex;
      gap: 4px;
      margin-left: auto;
    }
    .tab {
      padding: 6px 14px;
      border: 1px solid var(--gray-300);
      border-radius: 6px;
      background: var(--white);
      font-size: 12px;
      font-family: var(--font);
      cursor: pointer;
      color: var(--gray-600);
      transition: all .15s;
    }
    .tab:hover { border-color: var(--primary); color: var(--primary); }
    .tab.active {
      background: var(--primary);
      border-color: var(--primary);
      color: var(--white);
      font-weight: 600;
    }
    .tab-count {
      display: inline-block;
      background: rgba(255,255,255,0.3);
      border-radius: 10px;
      padding: 0 6px;
      font-size: 11px;
      margin-left: 4px;
    }
    .tab.active .tab-count { background: rgba(255,255,255,0.3); }
    .tab:not(.active) .tab-count {
      background: var(--gray-200);
      color: var(--gray-600);
    }

    /* 탭별 액션 바 */
    .tab-actions {
      padding: 10px 20px;
      border-bottom: 1px solid var(--gray-200);
      background: var(--white);
      display: flex;
      gap: 8px;
      align-items: center;
    }

    /* 신청서 행 */
    .app-row {
      display: flex;
      align-items: center;
      padding: 12px 20px;
      border-bottom: 1px solid var(--gray-100);
      gap: 12px;
      transition: background .15s;
    }
    .app-row:hover { background: var(--gray-50); }
    .app-row-name {
      font-weight: 600;
      font-size: 14px;
      color: var(--gray-800);
      min-width: 160px;
    }
    .app-row-meta {
      font-size: 12px;
      color: var(--gray-400);
      flex: 1;
    }
    .app-row-actions {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-shrink: 0;
    }
    .empty-state {
      padding: 48px 20px;
      text-align: center;
      color: var(--gray-400);
      font-size: 13px;
    }

    /* 상태 배지 */
    .status-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
      margin-left: 6px;
    }
    .status-badge.processing { background: #EEF2FF; color: #4338CA; }
    .status-badge.review     { background: var(--warning-light); color: var(--warning); }
    .status-badge.completed  { background: var(--success-light); color: var(--success); }

    .btn-trash { color: var(--gray-400); background: none; border: 1px solid var(--gray-200); }
    .btn-trash:hover { color: var(--danger); border-color: var(--danger); background: var(--danger-light); }
  </style>
</head>
<body>
  <header class="app-header">
    <div>
      <div class="logo">🌾 화성시 농업직불금 자동화 시스템</div>
      <div class="subtitle">Agricultural Direct Payment OCR System</div>
    </div>
    <span id="user-name" style="font-size:13px;opacity:0.8;margin-left:16px;"></span>
    <div style="margin-left:auto;display:flex;align-items:center;gap:8px;">
      <span id="api-status-pill" class="api-status disconnected">API 미연결</span>
      <button class="settings-btn" onclick="openSettings()" title="OCR API 설정">⚙️</button>
      <button class="btn-logout" onclick="logout()">로그아웃</button>
    </div>
  </header>

  <!-- 설정 모달 -->
  <div class="modal-overlay hidden" id="settings-modal">
    <div class="modal-box">
      <h3>⚙️ CLOVA OCR 설정</h3>
      <p style="font-size:13px;color:var(--gray-500);margin:8px 0 16px;">Secret Key는 브라우저 로컬에만 저장됩니다.</p>
      <div class="form-group">
        <label class="form-label">Secret Key</label>
        <input class="form-input" id="secret-key-input" type="password"
          placeholder="발급받은 Secret Key 붙여넣기" autocomplete="off">
      </div>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="closeSettings()">취소</button>
        <button class="btn btn-primary" onclick="saveSettings()">저장</button>
      </div>
    </div>
  </div>

  <div class="dash-body">
    <!-- 통계 카드 -->
    <div class="stats-row" style="margin-bottom:20px;">
      <div class="stat-card">
        <div class="stat-label">오늘 업로드</div>
        <div class="stat-value" id="stat-today">0</div>
        <div class="stat-sub">건</div>
      </div>
      <div class="stat-card stat-success">
        <div class="stat-label">검수 완료</div>
        <div class="stat-value" id="stat-completed">0</div>
        <div class="stat-sub">건</div>
      </div>
      <div class="stat-card stat-warning">
        <div class="stat-label">소농직불금 해당</div>
        <div class="stat-value" id="stat-sonanong">0</div>
        <div class="stat-sub">건 (완료 기준)</div>
      </div>
    </div>

    <!-- 업로드 섹션 -->
    <div class="upload-section">
      <div class="upload-section-title">
        신청서 업로드
      </div>
      <div class="upload-zone" id="upload-zone"
        onclick="document.getElementById('upload-file').click()"
        ondragover="handleDragOver(event)"
        ondragleave="handleDragLeave(event)"
        ondrop="handleDrop(event)">
        <input type="file" id="upload-file" accept="image/*" multiple style="display:none" onchange="handleFileSelect(event)">
        <div class="upload-controls" onclick="event.stopPropagation()">
          <label style="font-size:13px;font-weight:600;color:var(--gray-700);">신청서당 장수</label>
          <select id="pages-per-app" class="ppa-select" onchange="checkBatchReady()">
            <option value="1">1장</option>
            <option value="2" selected>2장</option>
            <option value="3">3장</option>
            <option value="4">4장</option>
            <option value="5">5장</option>
          </select>
          <span id="upload-count-label" style="margin-left:auto;font-size:12px;color:var(--gray-400);"></span>
        </div>
        <div class="upload-zone-hint" id="upload-hint">📂 클릭 또는 드래그하여 신청서 이미지 전체 업로드</div>
        <div class="upload-file-list" id="upload-file-list" onclick="event.stopPropagation()"></div>
      </div>
      <div style="margin-top:12px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
        <button class="btn btn-primary" id="ocr-btn" onclick="startBatchOCR()" disabled>
          🔍 OCR 시작
        </button>
        <span id="pair-summary" class="pair-summary"></span>
        <span id="upload-status" style="font-size:13px;color:var(--gray-500);"></span>
      </div>
    </div>

    <!-- 신청서 목록 -->
    <div class="list-section">
      <div class="list-toolbar">
        <input class="search-input" type="search" id="search-input"
          placeholder="🔍 이름으로 검색..." oninput="renderList()">
        <div class="tabs">
          <button class="tab active" data-tab="review" onclick="switchTab('review')">
            검수 대기 <span class="tab-count" id="count-review">0</span>
          </button>
          <button class="tab" data-tab="completed" onclick="switchTab('completed')">
            완료 <span class="tab-count" id="count-completed">0</span>
          </button>
          <button class="tab" data-tab="trash" onclick="switchTab('trash')">
            🗑️ 휴지통 <span class="tab-count" id="count-trash">0</span>
          </button>
        </div>
      </div>

      <!-- 완료 탭 액션 -->
      <div id="tab-actions-completed" class="tab-actions" style="display:none;">
        <button class="btn btn-outline btn-sm" onclick="exportCSV()">📄 CSV 내보내기</button>
        <button class="btn btn-outline btn-sm" onclick="exportExcel()">📊 Excel 내보내기</button>
        <span style="font-size:12px;color:var(--gray-400);margin-left:4px;">완료된 신청서만 포함됩니다</span>
      </div>

      <!-- 휴지통 탭 액션 -->
      <div id="tab-actions-trash" class="tab-actions" style="display:none;">
        <button class="btn btn-sm btn-trash" onclick="confirmEmptyTrash()">🗑️ 휴지통 비우기</button>
        <span style="font-size:12px;color:var(--gray-400);margin-left:4px;">비우면 복원이 불가합니다</span>
      </div>

      <div id="app-list">
        <div class="empty-state">아직 신청서가 없습니다. 위에서 1장과 2장을 함께 업로드하세요.</div>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/ocr.js"></script>
  <script src="js/mock-data.js"></script>
  <script src="js/imageDB.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
