<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>검수 완료 목록 — 화성시 농업직불금 자동화 시스템</title>
  <link rel="stylesheet" href="/shared/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body>
  <header class="app-header">
    <div>
      <div class="logo">🌾 화성시 농업직불금 자동화 시스템</div>
      <div class="subtitle">Agricultural Direct Payment OCR System</div>
    </div>
    <nav>
      <a href="dashboard.html">대시보드</a>
      <a href="completed.html" class="active">검수 완료</a>
    </nav>
    <span id="user-name" style="font-size:13px;opacity:0.8;margin-left:8px;"></span>
    <button class="btn-logout" onclick="logout()">로그아웃</button>
  </header>

  <div class="page-wrapper">
    <div class="security-banner">
      🔒 주민등록번호 뒷자리는 개인정보보호법 제24조에 따라 마스킹 처리됩니다.
    </div>

    <div class="stats-row" style="grid-template-columns:repeat(3,1fr);">
      <div class="stat-card stat-success">
        <div class="stat-label">검수 완료</div>
        <div class="stat-value" id="stat-completed">0</div>
        <div class="stat-sub">건</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">소농 조건 충족</div>
        <div class="stat-value" id="stat-pass" style="color:var(--success);">0</div>
        <div class="stat-sub">건 (해당)</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">소농 조건 미충족</div>
        <div class="stat-value" id="stat-fail" style="color:var(--danger);">0</div>
        <div class="stat-sub">건 (미해당)</div>
      </div>
    </div>

    <div class="export-bar">
      <span class="export-label">
        검수 완료 신청서 <strong id="count-label">0</strong>건
      </span>
      <button class="btn btn-outline" onclick="exportCSV()">📊 CSV 내보내기</button>
      <button class="btn btn-primary" onclick="exportExcel()">📗 Excel 내보내기</button>
    </div>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>신청서 ID</th>
            <th>접수유형</th>
            <th>성명</th>
            <th>주민등록번호</th>
            <th>전화번호</th>
            <th>계좌번호(은행명)</th>
            <th>신청면적(㎡)</th>
            <th>직불금 판정</th>
            <th>예상 지급액</th>
            <th>완료 시각</th>
          </tr>
        </thead>
        <tbody id="completed-tbody"></tbody>
      </table>
    </div>
  </div>

  <script src="/shared/js/config.js"></script>
  <script src="/shared/js/ocr-client.js"></script>
  <script src="/shared/js/sonanong.js"></script>
  <script src="/shared/js/api-client.js"></script>
  <script src="js/completed.js"></script>
</body>
</html>
